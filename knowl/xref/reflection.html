<figure class="figure figure-like"><div class="image-box" style="width: 50%; margin-left: 25%; margin-right: 25%;"><img src="external/Reflection.png" class="contained" alt="A plane in 3-dimensional space is shown centered at the origin. Orthogonal to the plane is a unit normal vector, n. A different vector, v, is show pointing away from the origin at a different angle from the normal vector. There are two other other vectors that are shown from this. One, called v-parallel, is a vector starting on the plane, pointing to the tip of vector v, that is parralel to the normal vector, n. The other vector, called v-orthogonal, is shown startng at the origin, and pointing the base of v-parallel. This vector is orthogonal to the normal vector, n. This represents that v can be decomposed into the sum of v-parallel and v-orthogonal based on some normal vector n defined by some plane. There are two final vectors. One, which we will call negative v-parallel, is on the other side of the plane as v-parallel, and pointing in the opposite direction. negative v-paralell still has its base at the end of v-orthogonal. The final vector is v prime, which is pointing from the origin to the tip of negative v-parallel. This represents how one can simply negate v-parallel, and add v-orthogonal, to obtain v prime, which is v’s reflection across the plane."></div>
<figcaption><span class="type">Figure</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">3.1<span class="period heading-divison-mark heading-divison-mark__period">.</span></span><span class="space heading-divison-mark heading-divison-mark__space"> </span>A reflection of a vector (blue), across a plane (grey), to obtain a reflected vector, (purple). The black vector is the normal of the plane. The green and red vectors are the components of the blue vector orthogonal and parallel to the normal vector, respectively. The maroon vector is the negative of the parallel component.<div class="autopermalink" data-description="Figure 3.1"><a href="#reflection" title="Copy heading and permalink for Figure 3.1" aria-label="Copy heading and permalink for Figure 3.1">🔗</a></div></figcaption></figure><span class="incontext"><a class="internal" href="ga-paper-5.html#reflection">in-context</a></span>
